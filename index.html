<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ridgeview Volunteer Schedule</title>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Ridgeview Institute — Recovery Meeting Chairs</h1>
      <a href="admin.html" class="btn admin-btn">Editor Login</a>
    </div>

    <div id="calendar"></div>

    <!-- Static weekday reference key (room/time detail for each weekday column) -->
    <div class="legend-row">
      <div class="legend-cell">1. COTTAGE E2 6:30PM</div>
      <div class="legend-cell">1. COTTAGE E2 6:30PM</div>
      <div class="legend-cell">1. COTTAGE E2 6:30PM</div>
      <div class="legend-cell">1. COTTAGE E2 6:30PM<br>2. Pro North 7:00PM RECOVERY</div>
      <div class="legend-cell">1. COTTAGE E2 8:00PM</div>
      <div class="legend-cell">1. COTTAGE E2 6:30PM<span class="legend-cell-first-fri">2. FIRST FRIDAY CH<br>3. Sp</span></div>
      <div class="legend-cell">1. Men 6:00PM<br>2. Women 6:00PM<br>3. COTTAGE E2 6:30PM</div>
    </div>
  </div>

  <script type="module">
    import { db } from "./js/firebase-config.js";
    import { fetchClaimedShifts, generateEvents, BASE_CALENDAR_OPTIONS } from "./js/schedule.js";

    const OPEN_COLORS = {
      openBg: "#eceff1",
      openText: "#607d8b",
      claimedBg: "#e8f5e9",
      claimedText: "#2e7d32"
    };

    document.addEventListener("DOMContentLoaded", async () => {
      const calendarEl = document.getElementById("calendar");

      try {
        const claimedShifts = await fetchClaimedShifts(db);

        const calendar = new FullCalendar.Calendar(calendarEl, {
          ...BASE_CALENDAR_OPTIONS,
          events: (fetchInfo, successCallback) => {
            successCallback(generateEvents(fetchInfo, claimedShifts, OPEN_COLORS));
          }
        });

        calendar.render();
      } catch (error) {
        console.error("Error loading the volunteer schedule:", error);
        calendarEl.textContent = "Sorry, the schedule couldn't be loaded right now. Please try again later.";
      }
    });
  </script>
</body>
</html>
